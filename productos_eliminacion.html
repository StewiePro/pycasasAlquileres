<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Eliminación de Productos - Gestión PYME</title>
  </head>
  <body>
    <header>
      <div class="logo">MiApp Gestión</div>
      <div id="user-info">
        Rol: <span id="current-role">-</span>
        <a href="login.html" class="btn-logout" onclick="cerrarSesion()"
          >Cerrar sesión</a
        >
      </div>
    </header>

    <div class="container">
      <nav class="sidebar" id="sidebar"></nav>

      <main>
        <div class="page-header">
          <h1>🗑️ Eliminación de Productos</h1>
          <p class="page-subtitle">Busca y elimina productos del inventario</p>
        </div>

        <div id="delete-msg" class="alert hidden"></div>

        <div class="card">
          <h3>🔍 Buscar Producto a Eliminar</h3>
          <div class="search-bar">
            <input
              type="text"
              id="buscar-input"
              placeholder="Busca por código o nombre..."
              oninput="buscarProductoEliminacion()"
            />
          </div>
          <div id="tabla-busqueda"></div>
        </div>

        <!-- Modal de confirmación -->
        <div id="modal-confirmar" class="modal">
          <div class="modal-content">
            <div class="modal-header">
              <h3>⚠️ Confirmar Eliminación</h3>
            </div>
            <div class="modal-body">
              <p>¿Estás seguro de que deseas eliminar el producto:</p>
              <p class="producto-nombre-confirm" id="confirm-nombre"></p>
              <p class="text-danger">Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
              <button class="btn btn-danger" onclick="confirmarEliminar()">
                🗑️ Sí, Eliminar
              </button>
              <button class="btn btn-secondary" onclick="cerrarModal()">
                ❌ Cancelar
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
    <script>
      initProductosEliminacion();
    </script>
  </body>
</html>
